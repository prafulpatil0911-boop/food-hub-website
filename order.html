<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Food</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    font-family:Arial,Helvetica,sans-serif;
}

.order-card{
    width:100%;
    max-width:950px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.food-img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.details{
    padding:35px;
}

.price{
    color:#ff5722;
    font-size:30px;
    font-weight:bold;
}

.qty-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.qty-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:#ff5722;
    color:#fff;
    font-size:22px;
}

.qty-btn:hover{
    background:#e64a19;
}

.qty{
    width:40px;
    text-align:center;
    font-size:25px;
    font-weight:bold;
}

.total{
    color:green;
    font-size:28px;
    font-weight:bold;
}

.btn-order{
    width:100%;
    background:#ff5722;
    color:white;
    border:none;
    padding:15px;
    border-radius:40px;
    font-size:20px;
}

.btn-order:hover{
    background:#e64a19;
}

.form-control{
    border-radius:10px;
}

@media(max-width:768px){

.food-img{
height:250px;
}

.details{
padding:20px;
}

}

</style>

</head>

<body>

<div class="order-card">

<div class="row g-0">

<div class="col-lg-5">

<img id="foodImage"
src=""
class="food-img">

</div>

<div class="col-lg-7">

<div class="details">

<h2 id="foodName" class="fw-bold"></h2>

<p class="text-muted">
Fresh • Delicious • Fast Delivery
</p>

<div class="price">
₹<span id="foodPrice"></span>
</div>

<hr>

<h5>Customer Details</h5>

<input id="name"
type="text"
class="form-control mb-3"
placeholder="Your Name">

<input id="phone"
type="tel"
class="form-control mb-3"
placeholder="Phone Number">

<textarea id="address"
class="form-control mb-3"
rows="3"
placeholder="Delivery Address"></textarea>

<hr>

<h5>Quantity</h5>

<div class="qty-box my-3">

<button class="qty-btn" onclick="decrease()">−</button>

<div class="qty" id="qty">1</div>

<button class="qty-btn" onclick="increase()">+</button>

</div>

<h3 class="total">

Total : ₹<span id="total">0</span>

</h3>

<button class="btn-order mt-3"
onclick="placeOrder()">

Place Order

</button>

</div>

</div>

</div>

</div>

<!-- Order Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">

      <div class="display-1">🎉</div>

      <h3 class="text-success mt-2">
        Order Placed Successfully!
      </h3>

      <p id="orderMessage"></p>

      <button class="btn btn-success mt-3" data-bs-dismiss="modal">
        OK
      </button>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const item = params.get("item") || "Your Meal";
const price = Number(params.get("price")) || 199;
const img = params.get("img") || "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600";

document.getElementById("foodName").innerHTML = item;
document.getElementById("foodPrice").innerHTML = price;
document.getElementById("foodImage").src = img;

let quantity = 1;

function updateTotal(){
    document.getElementById("qty").innerHTML = quantity;
    document.getElementById("total").innerHTML = quantity * price;
}

updateTotal();

function increase(){
    quantity++;
    updateTotal();
}

function decrease(){
    if(quantity > 1){
        quantity--;
        updateTotal();
    }
}

function placeOrder(){

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();

    if(name=="" || phone=="" || address==""){
        alert("Please fill all customer details.");
        return;
    }

    document.getElementById("orderMessage").innerHTML =
    "<strong>"+name+"</strong>, your order for <b>"+item+
    "</b> ("+quantity+" Qty) has been placed.<br><br>Total Amount : <b>₹"+
    (quantity*price)+"</b>";

    let modal = new bootstrap.Modal(document.getElementById("successModal"));
    modal.show();

}

</script>

</body>
</html>
