<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#ff9966,#ff5e62);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
padding:20px;
}

.card{
border:none;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.food-img{
height:220px;
object-fit:cover;
}

.price{
font-size:30px;
font-weight:bold;
color:#ff5722;
}

.qty-btn{
width:45px;
height:45px;
font-size:22px;
}

.summary{
background:#f8f9fa;
padding:15px;
border-radius:12px;
margin-top:20px;
}

#confirmSection{
display:none;
}

.success{
display:none;
text-align:center;
}

.success h2{
color:green;
}

</style>

</head>
<body>

<div class="card" style="max-width:500px;width:100%;">

<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1000"
class="food-img">

<div class="card-body">

<h2 class="text-center mb-3">
🍕 Customize Your Pizza
</h2>

<div id="orderSection">

<label class="fw-bold">Quantity</label>

<div class="d-flex align-items-center mb-3">

<button class="btn btn-danger qty-btn"
onclick="changeQty(-1)">-</button>

<input
type="text"
id="qty"
value="1"
class="form-control mx-2 text-center"
readonly>

<button class="btn btn-success qty-btn"
onclick="changeQty(1)">+</button>

</div>

<label class="fw-bold">Spice Level</label>

<select id="spice"
class="form-select mb-3">

<option>Mild 🌶</option>
<option>Medium 🌶🌶</option>
<option>Extra Spicy 🌶🌶🌶</option>

</select>

<div class="form-check mb-3">

<input
type="checkbox"
id="cheese"
class="form-check-input"
onchange="calculatePrice()">

<label class="form-check-label">
Extra Cheese (+₹50)
</label>

</div>

<label class="fw-bold">
Special Instructions
</label>

<textarea
id="note"
class="form-control"
rows="3"
placeholder="Example : No Onion"></textarea>

<div class="summary">

<h5>Order Summary</h5>

<p>Base Price : ₹250</p>

<p>Extra Cheese :
<span id="cheeseText">No</span>
</p>

<h3 class="price">
₹<span id="total">250</span>
</h3>

</div>

<button
class="btn btn-warning w-100 mt-4"
onclick="showConfirm()">

Next ➜ Confirm Order

</button>

</div>

<div id="confirmSection">

<h3 class="text-center mb-4">
Confirm Your Order
</h3>

<div id="details"
class="summary">
</div>

<button
class="btn btn-success w-100 mt-3"
onclick="confirmOrder()">

Confirm Order

</button>

<button
class="btn btn-secondary w-100 mt-2"
onclick="back()">

Back

</button>

</div>

<div class="success"
id="success">

<h2>
🎉 Order Confirmed!
</h2>

<p class="mt-3">
Thank you for ordering with us.
</p>

<h4 class="text-danger">
Your food is being prepared 🍕

</h4>

<button
class="btn btn-primary mt-3"
onclick="location.reload()">

Order Again

</button>

</div>

</div>

</div>

<script>

const basePrice=250;

function calculatePrice(){

let qty=parseInt(document.getElementById("qty").value);

let total=basePrice*qty;

if(document.getElementById("cheese").checked){

total+=50*qty;

document.getElementById("cheeseText").innerHTML="Yes";

}

else{

document.getElementById("cheeseText").innerHTML="No";

}

document.getElementById("total").innerHTML=total;

}

function changeQty(value){

let qty=parseInt(document.getElementById("qty").value);

qty+=value;

if(qty<1) qty=1;

document.getElementById("qty").value=qty;

calculatePrice();

}

function showConfirm(){

let qty=document.getElementById("qty").value;

let spice=document.getElementById("spice").value;

let cheese=document.getElementById("cheese").checked?"Yes":"No";

let note=document.getElementById("note").value||"None";

let total=document.getElementById("total").innerHTML;

document.getElementById("details").innerHTML=`

<h5>Order Details</h5>

<p><b>Quantity :</b> ${qty}</p>

<p><b>Spice :</b> ${spice}</p>

<p><b>Extra Cheese :</b> ${cheese}</p>

<p><b>Instructions :</b> ${note}</p>

<h3 class="text-danger">
Total : ₹${total}
</h3>

`;

document.getElementById("orderSection").style.display="none";

document.getElementById("confirmSection").style.display="block";

}

function back(){

document.getElementById("confirmSection").style.display="none";

document.getElementById("orderSection").style.display="block";

}

function confirmOrder(){

document.getElementById("confirmSection").style.display="none";

document.getElementById("success").style.display="block";

}

calculatePrice();

</script>

</body>
</html>
