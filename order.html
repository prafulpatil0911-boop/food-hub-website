<!DOCTYPE html>
<html>
<head>
    <title>Order Food</title>

    <style>

body{
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkred;
}

    </style>
</head>
<body>

<div class="container">

<h2>Place Your Order</h2>

<form>

<label>Food Name</label>

<input type="text" id="food" readonly>

<label>Price</label>

<input type="text" id="price" readonly>

<label>Your Name</label>

<input type="text" required>

<label>Phone Number</label>

<input type="tel" required>

<label>Address</label>

<input type="text" required>

<button type="submit">
Confirm Order
</button>

</form>

</div>

<script>

const params=new URLSearchParams(window.location.search);

document.getElementById("food").value=params.get("food");

document.getElementById("price").value="₹"+params.get("price");

</script>

</body>
</html>
