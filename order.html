```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Order Page</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    font-family:Arial, sans-serif;
}

.order-card{
    background:#fff;
    width:100%;
    max-width:950px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.left-side{
    background:#fff8f4;
    padding:20px;
}

.food-img{
    width:100%;
    border-radius:15px;
    height:350px;
    object-fit:cover;
}

.price{
    font-size:32px;
    color:#ff5e62;
    font-weight:bold;
}

.right-side{
    padding:30px;
}

.form-control,
.form-select{
    border-radius:10px;
}

.btn-order{
    background:#ff5e62;
    color:white;
    font-weight:bold;
    border:none;
}

.btn-order:hover{
    background:#e0484d;
    color:white;
}

.modal-content{
    border-radius:20px;
}

.check{
    font-size:70px;
}
</style>

</head>
<body>

<div class="order-card">

<div class="row g-0">

<!-- Left Side -->
<div class="col-md-5 left-side">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800"
class="food-img" alt="Burger">

<h2 class="mt-4 text-center">Cheese Burger</h2>

<p class="text-center text-muted">
Fresh beef burger with cheese, lettuce, tomato and special sauce.
</p>

<h3 class="price text-center">₹199</h3>

</div>

<!-- Right Side -->
<div class="col-md-7 right-side">

<h2 class="mb-4">Place Your Order</h2>

<form>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter your full name" required>
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="tel" class="form-control" placeholder="Enter your phone number" required>
</div>

<div class="mb-3">
<label class="form-label">Delivery Address</label>
<textarea class="form-control" rows="3" placeholder="Enter your address" required></textarea>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Quantity</label>
<input type="number" class="form-control" value="1" min="1">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Payment Method</label>

<select class="form-select">
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
</select>

</div>

</div>

<div class="mb-3">
<label class="form-label">Special Instructions</label>
<textarea class="form-control" rows="2" placeholder="Extra cheese, less spicy..."></textarea>
</div>

<div class="d-grid">
<button type="button"
class="btn btn-order btn-lg"
data-bs-toggle="modal"
data-bs-target="#orderModal">
Place Order
</button>
</div>

</form>

</div>

</div>

</div>

<!-- Confirmation Popup -->
<div class="modal fade" id="orderModal" tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-body text-center p-5">

<div class="check">✅</div>

<h2 class="text-success mt-3">
Order Confirmed!
</h2>

<p class="mt-3 text-muted">
Thank you for your order.<br>
Your delicious food is being prepared.
</p>

<button class="btn btn-success mt-3 px-4"
data-bs-dismiss="modal">
OK
</button>

</div>

</div>

</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
